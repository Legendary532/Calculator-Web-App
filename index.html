<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator-Made By Me!</title>
</head>

<body>
    <h1 class="text-center">Welcome to Calculator!</h1>
    <div class="container flex flex-col items-center mx-auto m-w-20">
        <div class="row">
            <input type="text" class="input">
        </div>
        <div class="row">
            <button class="button">C</button>
            <button class="button">%</button>
            <button class="button">H+</button>
            <button class="button">H-</button>
        </div>
        <div class="row">
            <button class="button">7</button>
            <button class="button">8</button>
            <button class="button">9</button>
            <button class="button">*</button>
        </div>
        <div class="row">
            <button class="button">4</button>
            <button class="button">5</button>
            <button class="button">6</button>
            <button class="button">/</button>
        </div>
        <div class="row">
            <button class="button">1</button>
            <button class="button">2</button>
            <button class="button">3</button>
            <button class="button">+</button>
        </div>
        <div class="row">
            <button class="button">0</button>
            <button class="button">.</button>
            <button class="button">=</button>
            <button class="button">-</button>
        </div>
    </div>

    <style>
        body {
            height: 100%;
            width: 100%;
            font-family: Arial, Helvetica, sans-serif;
            background: black;
        }

        .text-center {
            text-align: center;
        }

        .button {
            width: 66px;
            padding: 20px;
            margin: 0 3px;
            border: 2px solid black;
            border-radius: 9px;
            font-weight: bold;
            font-size: 18px;
            color: #fff;
            background-color: rgb(240, 118, 36);
        }

        .button:hover {
            font-size: 20px;
            color: rgb(240, 118, 36);
            background-color: #fff;
        }

        .mx-auto {
            margin: auto;
        }

        .flex {
            display: flex;
        }

        .flex-col {
            flex-direction: column;
        }

        .items-center {
            align-items: center;
        }

        .row {
            margin: 8px 0;
        }

        .row input {
            color: rgb(240, 118, 36);
            width: 291px;
            font-size: 23px;
            margin: 0;
            padding: 10px 0px;
            border: 2px solid black;
            border-radius: 5px;
        }

        @media (max-width: 768px) {

            h1 {
                font-size: 22px;
                padding: 10px;
                color: white;
            }

            .container {
                width: 100%;
                padding: 10px;
            }

            .row {
                display: flex;
                justify-content: center;
                flex-wrap: wrap;
                gap: 8px;
            }

            .button {
                width: 60px;
                padding: 15px;
                font-size: 16px;
            }

            .button:hover {
                font-size: 17px;
            }

            .row input {
                width: 100%;
                font-size: 20px;
            }

            @media (max-width: 480px) {

                .button {
                    width: 55px;
                    padding: 12px;
                    font-size: 14px;
                }

                .row input {
                    font-size: 18px;
                }
            }
        }
    </style>

    <script>
        let string = " ";
        let buttons = document.querySelectorAll('.button');
        let memory = 0; // Initialize a memory variable for H+ and H-

        Array.from(buttons).forEach((button) => {
            button.addEventListener('click', (e) => {
                const value = e.target.innerHTML;

                if (value === '=') {
                    try {
                        string = eval(string); // Evaluate the expression
                        document.querySelector('input').value = string;
                    } catch (error) {
                        document.querySelector('input').value = 'Error'; // Handle invalid expressions
                    }
                }
                else if (value === 'C') {
                    string = ""; // Clear the input field
                    document.querySelector('input').value = string;
                }
                else if ((value === 'H+') || (value === 'H-')) {
                    // Handle H+ and H- functionality
                    if (value === 'H+') {
                        memory += 1;
                    } else if (value === 'H-') {
                        memory -= 1;
                    }
                    string = memory.toString(); // Display memory value
                    document.querySelector('input').value = string;
                }
                else {
                    string += value; // Append the clicked button value to the string
                    document.querySelector('input').value = string;
                }
            });
        });
    </script>
</body>

</html>
